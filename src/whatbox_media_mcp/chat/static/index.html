<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Whatbox Media</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f5;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #shell {
    width: 100%;
    max-width: 720px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    background: #fff;
    box-shadow: 0 0 24px rgba(0,0,0,.08);
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid #e5e5e5;
    flex-shrink: 0;
  }

  header h1 { font-size: 1rem; font-weight: 600; color: #111; }

  #logout-btn {
    background: none;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 5px 12px;
    font-size: .8rem;
    cursor: pointer;
    color: #555;
  }
  #logout-btn:hover { background: #f5f5f5; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .bubble {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: .93rem;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .bubble.user {
    align-self: flex-end;
    background: #1a1a1a;
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .bubble.assistant {
    align-self: flex-start;
    background: #f0f0f0;
    color: #111;
    border-bottom-left-radius: 4px;
  }

  /* bouncing ellipsis */
  .ellipsis { display: inline-flex; gap: 4px; padding: 4px 2px; }
  .ellipsis span {
    width: 7px; height: 7px;
    background: #999;
    border-radius: 50%;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .ellipsis span:nth-child(2) { animation-delay: .2s; }
  .ellipsis span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40%           { transform: translateY(-6px); }
  }

  #input-bar {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid #e5e5e5;
    flex-shrink: 0;
  }

  #input {
    flex: 1;
    border: 1px solid #ddd;
    border-radius: 20px;
    padding: 10px 16px;
    font-size: .93rem;
    outline: none;
    resize: none;
    font-family: inherit;
    line-height: 1.4;
    max-height: 120px;
    overflow-y: auto;
  }
  #input:focus { border-color: #1a1a1a; }

  #send-btn {
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 10px 18px;
    font-size: .93rem;
    cursor: pointer;
    flex-shrink: 0;
    align-self: flex-end;
  }
  #send-btn:disabled { background: #ccc; cursor: default; }
  #send-btn:not(:disabled):hover { background: #333; }
</style>
</head>
<body>
<div id="shell">
  <header>
    <h1>📺 Whatbox Media</h1>
    <button id="logout-btn">Sign out</button>
  </header>
  <div id="messages"></div>
  <div id="input-bar">
    <textarea id="input" rows="1" placeholder="Ask about your library…"></textarea>
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send-btn');
  const logoutBtn  = document.getElementById('logout-btn');

  let history = JSON.parse(sessionStorage.getItem('chat_history') || '[]');

  // Restore prior session bubbles
  history.forEach(msg => {
    if (msg.role === 'user') {
      const text = typeof msg.content === 'string' ? msg.content
        : (msg.content.find(b => b.type === 'text') || {}).text || '';
      if (text) addBubble('user', text);
    } else if (msg.role === 'assistant') {
      const text = typeof msg.content === 'string' ? msg.content
        : Array.isArray(msg.content)
          ? msg.content.filter(b => b.type === 'text').map(b => b.text).join('\n')
          : '';
      if (text) addBubble('assistant', text);
    }
  });

  function addBubble(role, content) {
    const div = document.createElement('div');
    div.className = `bubble ${role}`;
    div.textContent = content;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function addEllipsis() {
    const div = document.createElement('div');
    div.className = 'bubble assistant';
    div.innerHTML = '<span class="ellipsis"><span></span><span></span><span></span></span>';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  async function send() {
    const message = inputEl.value.trim();
    if (!message) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    addBubble('user', message);
    const ellipsis = addEllipsis();

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, history }),
      });

      if (resp.status === 302 || resp.status === 401) {
        window.location.href = '/auth/login';
        return;
      }

      if (!resp.ok) {
        ellipsis.textContent = 'Something went wrong. Please try again.';
        return;
      }

      const data = await resp.json();
      history = data.history;
      sessionStorage.setItem('chat_history', JSON.stringify(history));
      ellipsis.textContent = data.reply;
    } catch {
      ellipsis.textContent = 'Could not reach the server. Please try again.';
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', send);

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  // Auto-grow textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = inputEl.scrollHeight + 'px';
  });

  logoutBtn.addEventListener('click', async () => {
    sessionStorage.removeItem('chat_history');
    await fetch('/auth/logout', { method: 'POST' });
    window.location.href = '/auth/login';
  });
</script>
</body>
</html>
